name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint (zero warnings)
        run: npm run lint

      - name: Node syntax check
        run: npm run check:syntax

      - name: Shell syntax check
        run: |
          bash -n scripts/setup.sh
          bash -n scripts/init-repo.sh

      - name: YAML validation
        run: npm run check:yaml

  e2e:
    name: E2E (Ghost in Docker)
    runs-on: ubuntu-latest
    needs: lint
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: ghost
          MYSQL_USER: ghost
          MYSQL_PASSWORD: ghostpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start Ghost
        run: |
          docker run -d --name ghost \
            --network host \
            -e url=http://localhost:2368 \
            -e database__client=mysql \
            -e database__connection__host=127.0.0.1 \
            -e database__connection__user=ghost \
            -e database__connection__password=ghostpass \
            -e database__connection__database=ghost \
            -e NODE_ENV=development \
            ghost:5-alpine

      - name: Wait for Ghost
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:2368/ghost/api/admin/site/ > /dev/null 2>&1; then
              echo "Ghost is up after ~$((i*2))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Ghost failed to start"
              docker logs ghost
              exit 1
            fi
            sleep 2
          done

      - name: Bootstrap Ghost (admin user + API keys)
        run: |
          # Create admin user
          curl -sf -X POST http://localhost:2368/ghost/api/admin/authentication/setup/ \
            -H "Content-Type: application/json" \
            -d '{
              "setup": [{
                "name": "CI Admin",
                "email": "ci@ghost.local",
                "password": "Str0ngP@ssword123!",
                "blogTitle": "Engineering Blog"
              }]
            }'

          # Get session cookie
          SESSION=$(curl -sf -D - -o /dev/null -X POST \
            http://localhost:2368/ghost/api/admin/session/ \
            -H "Content-Type: application/json" \
            -H "Origin: http://localhost:2368" \
            -d '{"username":"ci@ghost.local","password":"Str0ngP@ssword123!"}' \
            | grep -i 'set-cookie' | head -1 \
            | sed 's/.*ghost-admin-api-session=\([^;]*\).*/ghost-admin-api-session=\1/')

          # Create integration
          RESULT=$(curl -sf -X POST http://localhost:2368/ghost/api/admin/integrations/ \
            -H "Content-Type: application/json" \
            -H "Cookie: ${SESSION}" \
            -H "Origin: http://localhost:2368" \
            -d '{"integrations":[{"name":"CI Publisher"}]}')

          # Extract keys
          ADMIN_KEY=$(echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          keys = data['integrations'][0]['api_keys']
          for k in keys:
              if k['type'] == 'admin':
                  print(k['secret'] if ':' in k['secret'] else k['id'] + ':' + k['secret'])
                  break
          ")

          CONTENT_KEY=$(echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          keys = data['integrations'][0]['api_keys']
          for k in keys:
              if k['type'] == 'content':
                  print(k['secret'])
                  break
          ")

          echo "GHOST_ADMIN_API_KEY=${ADMIN_KEY}" >> "$GITHUB_ENV"
          echo "GHOST_CONTENT_API_KEY=${CONTENT_KEY}" >> "$GITHUB_ENV"
          echo "GHOST_API_URL=http://localhost:2368" >> "$GITHUB_ENV"

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Ghost logs (on failure)
        if: failure()
        run: docker logs ghost
